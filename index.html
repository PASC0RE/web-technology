<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Миний вэб сайт</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f172a;
      --accent: #6366f1;
      --accent2: #a855f7;
      --light: #f8fafc;
      --muted: #64748b;
      --card-bg: #ffffff;
      --border: #e2e8f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--light);
      color: var(--primary);
    }

    /* ===== NAVBAR ===== */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    #dynamicMenu {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #dynamicMenu a {
      text-decoration: none;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    #dynamicMenu a:hover {
      background: var(--light);
      color: var(--primary);
    }

    .nav-admin-btn {
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      padding: 7px 18px;
      border-radius: 8px;
      transition: opacity 0.2s;
    }

    .nav-admin-btn:hover { opacity: 0.85; }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      overflow: hidden;
      padding: 100px 40px;
      text-align: center;
      background: var(--primary);
    }

    .hero::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.3) 0%, transparent 70%);
      top: -200px;
      left: -100px;
    }

    .hero::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.25) 0%, transparent 70%);
      bottom: -150px;
      right: -50px;
    }

    .hero-content { position: relative; z-index: 1; }

    .hero-tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.25);
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 24px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(40px, 6vw, 72px);
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    .hero p {
      font-size: 18px;
      color: rgba(255,255,255,0.55);
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto 36px;
      line-height: 1.7;
    }

    .hero-btn {
      display: inline-block;
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 15px;
      font-weight: 500;
      padding: 14px 32px;
      border-radius: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(99,102,241,0.35);
    }

    .hero-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(99,102,241,0.45);
    }

    /* ===== NEWS SECTION ===== */
    .news-section {
      padding: 80px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      letter-spacing: -0.5px;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      margin-left: 24px;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .news-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
    }

    .news-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.07);
      border-color: var(--accent);
    }

    .news-card-num {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .news-card h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .news-card p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 15px;
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--primary);
      color: rgba(255,255,255,0.4);
      text-align: center;
      padding: 32px 20px;
      font-size: 13px;
    }

    footer span {
      color: var(--accent);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="nav-logo">Миний сайт</div>
    <div id="dynamicMenu"></div>
    <a href="admin/" class="nav-admin-btn">⚙ Админ</a>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-content">
      <div class="hero-tag">eo_to</div>
      <h1>Тавтай морил</h1>
      <p>Энэхүү вэб сайт нь агуулга удирдах системтэй бөгөөд Admin хэсгээс цэс болон мэдээгээ удирдах боломжтой.</p>
      <a href="admin/" class="hero-btn">Админ хэсэг →</a>
    </div>
  </section>

  <!-- News -->
  <section id="news" class="news-section">
    <div class="section-header">
      <h2 class="section-title">Мэдээ</h2>
      <div class="section-line"></div>
    </div>
    <div class="news-grid" id="dynamicNews"></div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 Миний сайт — <span>eo_to</span></p>
  </footer>

<script>
    const API = 'https://web-technology-zeta.vercel.app/api';

    // Цэс
    fetch(`${API}/menus`)
      .then(r => r.json())
      .then(menus => {
        document.getElementById('dynamicMenu').innerHTML =
          menus.map(m => `<a href="${m.link}">${m.name}</a>`).join('');
      });

    // Мэдээ
    fetch(`${API}/news`)
      .then(r => r.json())
      .then(news => {
        const grid = document.getElementById('dynamicNews');
        grid.innerHTML = news.length === 0
          ? `<div class="empty-state">
               <div class="empty-state-icon">📭</div>
               <p>Одоогоор мэдээ байхгүй байна.<br>Админ хэсгээс мэдээ нэмнэ үү.</p>
             </div>`
          : news.map((n, i) => `
              <div class="news-card">
                <div class="news-card-num">№ ${String(i+1).padStart(2,'0')}</div>
                <h3>${n.title}</h3>
                <p>${n.content}</p>
              </div>`).join('');
      });
  </script>

</body>
</html>
